# Ursus appearance + visual organs (upstream PR#42476). parts.rsi only (sexed); internals reused from Human.
# markingsGroup "Ursus" defined in ADT/Body/markingsGroups.yml

- type: entity
  parent: BaseSpeciesAppearance
  id: ADTAppearanceUrsus
  categories: [ HideSpawnMenu ]
  name: ursus appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganUrsusTorso
      Head: ADTOrganUrsusHead
      ArmLeft: ADTOrganUrsusArmLeft
      ArmRight: ADTOrganUrsusArmRight
      HandRight: ADTOrganUrsusHandRight
      HandLeft: ADTOrganUrsusHandLeft
      LegLeft: ADTOrganUrsusLegLeft
      LegRight: ADTOrganUrsusLegRight
      FootLeft: ADTOrganUrsusFootLeft
      FootRight: ADTOrganUrsusFootRight
      Brain: ADTOrganUrsusBrain
      Eyes: ADTOrganUrsusEyes
      Tongue: ADTOrganUrsusTongue
      Appendix: ADTOrganUrsusAppendix
      Ears: ADTOrganUrsusEars
      Lungs: ADTOrganUrsusLungs
      Heart: ADTOrganUrsusHeart
      Stomach: ADTOrganUrsusStomach
      Liver: ADTOrganUrsusLiver
      Kidneys: ADTOrganUrsusKidneys
  - type: HumanoidProfile
    species: UrsusSpecies
  - type: Inventory
    speciesId: urs
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

# Ursus mob (upstream PR#42476). Appearance/body/sprite come from AppearanceUrsus.
- type: entity
  parent:
  - ADTAppearanceUrsus
  - BaseSpeciesMobOrganic
  id: MobUrsus
  name: Urist McUrsus
  components:
  - type: NpcFactionMember
    factions:
    - Ursus
    - NanoTrasen
  - type: MobThresholds
    thresholds:
      0: Alive
      115: Critical
      250: Dead
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.3
        Heat: 0.05
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 235
  - type: Hunger
    baseDecayRate: 0.085 # В 5 с чем-то раз больше стандартного
    thresholds:
      Overfed: 450
      Okay: 375
      Peckish: 225
      Starving: 125
      Dead: 0
  - type: Thirst
    #baseDecayRate: 0.0083
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatBear
      amount: 5
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 4.5
        Slash: 3.5
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.4
    baseSprintSpeed : 4.3
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250 # bigger density
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Damageable
    damageModifierSet: Ursus
  - type: Injurable
    damageContainer: Biological
  - type: Vocal
    sounds:
      Male: MaleUrsus
      Female: FemaleUrsus
      Unsexed: MaleUrsus
  - type: LanguageSpeaker
    languages:
      GalacticCommon: Speak
      Urs: Speak
  - type: TypingIndicator
    proto: ADTursus
  - type: Temperature
    currentTemperature: 310
    specificHeat: 50
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 250
    coldDamage:
      types:
        Cold: 0.01 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      283: 0.8
      245: 0.6
      220: 0.4
  - type: SlowOnDamage
    speedModifierThresholds:
      64: 0.8
      86: 0.7
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: Sprite
    scale: 1.03, 1.03
  - type: SizeAttributeWhitelist # Frontier
    tall: true
    tallscale: 1.12
    short: true
    shortscale: 0.98
    shortDensity: 0.7
  - type: UrsusSleep

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganUrsus
  abstract: true
  suffix: ursus

- type: entity
  parent: ADTOrganUrsus
  id: ADTOrganUrsusInternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Ursus/organs.rsi

- type: entity
  id: ADTOrganUrsusMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  id: ADTOrganUrsusVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Ursus/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Ursus

- type: entity
  parent: [ ADTOrganUrsus, ADTOrganUrsusVisual ]
  id: ADTOrganUrsusExternal
  abstract: true
  components:
