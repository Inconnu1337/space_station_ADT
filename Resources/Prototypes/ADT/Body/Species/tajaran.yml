      HandLeft: ADTOrganTajaranHandLeft
      LegLeft: ADTOrganTajaranLegLeft
      LegRight: ADTOrganTajaranLegRight
      FootLeft: ADTOrganTajaranFootLeft
      FootRight: ADTOrganTajaranFootRight
      Brain: ADTOrganTajaranBrain
      Eyes: ADTOrganTajaranEyes
      Tongue: ADTOrganTajaranTongue
      Appendix: ADTOrganTajaranAppendix
      Ears: ADTOrganTajaranEars
      Lungs: ADTOrganTajaranLungs
