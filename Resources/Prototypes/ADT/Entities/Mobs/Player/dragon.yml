- type: entity
  parent: BaseAction
  id: ActionRiseFish
  name: "[color=cyan]Summon Carp-sharks[/color]"
  description: Summons 3 carp-sharks on the spot to protect you from danger!
  components:
  - type: Action
    icon:
      sprite: ADT/Interface/Actions/dragon.rsi
      state: carp_horde
    useDelay: 120 # ADT-Tweak(90 ---> 120)
    priority: 4
  - type: InstantAction
    event: !type:DragonSpawnCarpHordeActionEvent

- type: entity
  parent: BaseAction
  id: ActionDragonRoar
  name: "[color=yellow]Dragon Roar[/color]"
  description: Flap your wings and roar to stun all enemies around you!
  components:
  - type: Action
    icon:
      sprite: ADT/Interface/Actions/dragon.rsi
      state: wing_flap
    useDelay: 60 # ADT-Tweak (45 ---> 60)
    priority: 5
  - type: InstantAction
    event: !type:DragonRoarActionEvent
