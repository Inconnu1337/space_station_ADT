- type: species
  id: IPC
  name: species-name-ipc
  roundStart: true # закомментировано для теста
  prototype: MobIPC
  dollPrototype: ADTAppearanceIPC
  skinColoration: Hues
  shortDesc: species-short-desc-ipc
  sponsorOnly: false
  minAge: 1
  maxAge: 55
  oldAge: 50
  youngAge: 25
  maleFirstNames: IpcFirst
  femaleFirstNames: IpcFirst
  maleLastNames: IpcLast # Corvax-LastnameGender
  femaleLastNames: IpcLast # Corvax-LastnameGender
  naming: FirstDashLast
  sexes:
  - Unsexed
  category: Special
  description: "/ServerInfo/ADT/SpeciesDescriptions/IPC.xml"
  pros:
  - Имеют на 25 больше здоровья чем другие расы (125).
  - Имеют 200 единиц выносливости.
  - Имеют более совершенные механизмы терморегуляции.
  - Не восприимчивы к асфиксии, кровопотери, ядам, вирусам, радиации, давлению, клеточным и вспышкам.
  - Имеют лимит языков в 2 раза больше обычного (6).
  - Не восприимчивы к наступанию на острые предметы.
  - Не гниют.
  special:
  - Вместо голода и жажды регулярно заряжаются от ЛКП (Alt+ЛКМ).
  - Имеют возможность замены стандартной батареи (ПКМ+Разблокировать/Заблокировать)
  - Для использования ключей шифрования помещают их напрямую в тело (отвёртка, кусачки для извлечения).
  - Ремонтируются сварочным аппаратом (механические), СВ и ВВ кабелями (электрические и химические) и любым видом стекла (ожоги и обморожения).
  - Могут менять изображение своего экрана в любой момент.
  - Имеют встроенный фонарик.
  cons:
  - Воздействие ЭМИ и ионного оружия критично.
  - Сниженный почти в два раза порог расчленения.
  - Падение не защищает от пуль, взрывов и ударов.
  - Не имеют критического состояния.
  - Отсутствует слот для очков и маски.
  - Медленнее остальных рас.
  - Имеют сильное замедление от урона.
  - Не могут использовать импланты.
  defaultLanguages:
  - GalacticCommon
  - RobotTalk
  - BorgTalk
  uniqueLanguages:
  - RobotTalk
  - Bubblish
  - RootSpeak
  maxLanguages: 6

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
